# Common YCSB properties shared by all workloads.
# Per-workload files override only the operation proportions and distribution.

workload=com.jetbrains.youtrackdb.ycsb.workloads.CoreWorkload
db=com.jetbrains.youtrackdb.ycsb.binding.YouTrackDBYqlClient

# Dataset size: 3.5M records (~3.5 GB on disk with indexes)
recordcount=3500000

# Operations per workload run
operationcount=1000000

# Standard YCSB schema: 10 fields of 100 bytes each
fieldcount=10
fieldlength=100

# Single table (YouTrackDB class)
table=usertable

# HdrHistogram for accurate latency measurement
measurementtype=hdrhistogram
hdrhistogram.percentiles=50,95,99,99.9
