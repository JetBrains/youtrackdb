name: Java CI/CD Weekly Beta Release Pipeline
on:
  workflow_dispatch:
  schedule:
    # Saturday 06:00 UTC. Cron is in UTC; this is roughly the start of
    # the weekend across all our contributor timezones.
    - cron: '0 6 * * 6'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Release uploads are not idempotent: once `central-publishing-maven-plugin`
  # has staged artifacts under `autoPublish=true`, cancelling mid-flight can
  # leave a half-published version that we cannot retry under the same
  # coordinate (Central refuses re-uploads of an existing release version).
  # If a manual `workflow_dispatch` overlaps with the cron run we queue
  # instead of cancelling.
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  classify:
    name: Classify changes and pick beta coordinate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
      skip_reason: ${{ steps.decide.outputs.skip_reason }}
      head_sha: ${{ steps.vars.outputs.head_sha }}
      changelist: ${{ steps.coord.outputs.changelist }}
      release_tag: ${{ steps.coord.outputs.release_tag }}
      base_version: ${{ steps.coord.outputs.base_version }}
      prev_ref: ${{ steps.prev.outputs.prev_ref }}
      prev_scope: ${{ steps.prev.outputs.scope }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          # Full history so we can diff against the previous beta tag.
          fetch-depth: 0
          # Drop GITHUB_TOKEN from .git/config so the unrestricted Bash
          # available to Claude in the classify step can't exfiltrate it.
          # All git operations from here on are read-only against the
          # local clone, and `gh` authenticates via GH_TOKEN env.
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          overwrite-settings: false

      - name: Capture HEAD SHA
        id: vars
        run: echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine beta coordinate (with collision-aware suffix)
        id: coord
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_MIRROR_USERNAME: ${{ secrets.MAVEN_MIRROR_USERNAME }}
          MAVEN_MIRROR_PASSWORD: ${{ secrets.MAVEN_MIRROR_PASSWORD }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          # Read the canonical project version (the `revision` CI-friendly
          # property) without the `-SNAPSHOT` changelist applied, so we can
          # build the beta coordinate from a clean base.
          BASE_VERSION=$(mvn -s .github/workflows/settings.xml help:evaluate \
            -Dexpression=revision -q -DforceStdout)
          BASE_TAG="${BASE_VERSION}-beta-${DATE}"
          # Auto-append `-2`, `-3`, … if a release with the same coordinate
          # already exists. Central Portal release coordinates are immutable
          # (re-uploading would fail) and the GitHub tag must be unique too.
          TAG="$BASE_TAG"
          N=2
          while gh release view "$TAG" --repo "${{ github.repository }}" \
              >/dev/null 2>&1; do
            TAG="${BASE_TAG}-${N}"
            N=$((N + 1))
          done
          # `changelist` is whatever follows BASE_VERSION; the project POM
          # uses ${revision}${sha1}${changelist} so passing this rebuilds
          # the same coordinate downstream.
          CHANGELIST="${TAG#${BASE_VERSION}}"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "changelist=$CHANGELIST" >> "$GITHUB_OUTPUT"
          echo "::notice title=Beta coordinate::${TAG}"

      - name: Determine previous beta base
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the most recent published release as the diff base. On
          # first ever run this is empty, so fall back to the parent of
          # HEAD — the diff will still be meaningful.
          PREV_TAG=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // empty')

          if [ -n "$PREV_TAG" ] && git rev-parse --verify "refs/tags/$PREV_TAG" >/dev/null 2>&1; then
            PREV_REF="$PREV_TAG"
            SCOPE="since previous beta \`$PREV_TAG\`"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            PREV_REF=$(git rev-parse HEAD^)
            SCOPE="since parent commit of HEAD (no prior release found)"
          else
            PREV_REF=$(git rev-parse HEAD)
            SCOPE="initial release (no prior history)"
          fi

          echo "prev_ref=$PREV_REF" >> "$GITHUB_OUTPUT"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "::notice title=Beta diff base::${PREV_REF} (${SCOPE})"

      - name: Classify changes and draft release notes with Claude
        # Same classifier prompt and pinned action as the previous
        # snapshot pipeline; the structural difference is that this
        # step now runs *before* deploy, so its decision gates the
        # whole publish, not just the GitHub tag.
        # Pinned to an immutable commit SHA (not a tag) to prevent
        # tag-moving supply-chain attacks; the comment lists the
        # corresponding upstream revision the pin was taken from.
        # If the step fails for any reason, the next step falls back
        # to publishing with a stub body — silently swallowing a
        # week of work is worse than publishing notes that need a
        # human follow-up.
        continue-on-error: true
        uses: anthropics/claude-code-base-action@c937844d71159a8f6409acb3be0d10ea3cf92042 # main @ 2026-04-20, Claude Code 2.1.116
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Print Claude's tool calls (and any permission denials) to the
          # job log so that when the step silently falls back to the stub
          # body we can see why without rerunning in debug mode.
          show_full_output: true
          prompt: |
            You are writing GitHub release notes for a YouTrackDB weekly beta release.

            ## Release
            - Tag / Maven version: `${{ steps.coord.outputs.release_tag }}`
            - Commit: `${{ steps.vars.outputs.head_sha }}`
            - Scope: ${{ steps.prev.outputs.scope }}

            ## Instructions
            1. Inspect the range `${{ steps.prev.outputs.prev_ref }}..${{ steps.vars.outputs.head_sha }}`:
               - `git log ${{ steps.prev.outputs.prev_ref }}..${{ steps.vars.outputs.head_sha }} --oneline --no-merges`
               - `git diff ${{ steps.prev.outputs.prev_ref }}..${{ steps.vars.outputs.head_sha }} --stat`
               - `git diff ${{ steps.prev.outputs.prev_ref }}..${{ steps.vars.outputs.head_sha }}` (read selectively for large diffs)
            2. Decide whether the range is **purely infrastructural** — i.e.
               every change is one of:
                 - CI / GitHub Actions workflows (`.github/`)
                 - Build-tool config that doesn't affect the published artifact's
                   runtime behavior (Maven plugin versions, `.mvn/`, Spotless
                   config, git hooks, `.gitignore`, Dependabot config)
                 - Repository-level docs (`README.md`, `docs/`, ADRs,
                   `CLAUDE.md`, contribution guides)
                 - Test-only tweaks that don't change production code
                 - Formatting-only churn (Spotless reformat, whitespace)
               A change that touches production source under `core/`, `server/`,
               `client/`, `driver/`, `console/`, `embedded/`, `gremlin-*`, etc.,
               or that adds/removes/upgrades a runtime dependency in `pom.xml`,
               is **not** infrastructural — even if it's small. When in doubt,
               treat the range as non-infrastructural and produce notes.
               Borderline examples that **are** infrastructural: Maven plugin
               version bumps that don't regenerate sources or change artifact
               bytes, tweaks to `.mvn/jvm.config`, README/docs fixes, CI-only
               permission changes. Borderline examples that are **not**:
               any `<dependency>` add/remove/upgrade in a `pom.xml` (even a
               transitively-bundled runtime like Netty), any change to
               `core/src/main/grammar/YouTrackDBSql.jjt` (regenerates the SQL
               parser), any change to `META-INF/services/` (SPI wiring),
               any change to `GlobalConfiguration.java` (tunables exposed to
               users).
               - If the range **is** purely infrastructural: write a single
                 human-readable line (≤120 characters, no newlines) to
                 `/tmp/release-skip-reason` (e.g.
                 `CI-only: release-notes workflow tweak`) and stop. Do NOT
                 write `/tmp/release-notes.md`. The decide step will see
                 the skip file and not deploy this week.
               - Otherwise, continue with steps 3–7 below to produce notes.
               For very large diffs, start with `--stat` to identify the hot
               paths, then narrow with `git diff ... -- <path>` piped through
               `head` / `grep` rather than dumping the full diff.
            3. Group the user-visible changes by theme (features, bug fixes,
               performance, refactors, docs/infra). Omit categories that are empty.
            4. Preserve YTDB issue IDs (e.g. `YTDB-123`) where they appear in
               commit messages — link them to
               `https://youtrack.jetbrains.com/issue/YTDB-123`.
            5. Keep the notes focused and skimmable. Drop purely internal churn
               (renames, whitespace, test-only tweaks) unless nothing else
               changed.
            6. Write the final Markdown to `/tmp/release-notes.md`. Do not add
               a top-level heading — GitHub renders the release title
               separately. Start directly with the section headings.
            7. If the diff is empty, write a single line:
               `No source changes since the previous beta.`
          # The base-action doesn't grant any tool permissions by default;
          # without `--allowed-tools` Claude can't run `git log`/`git diff`
          # or write `/tmp/release-notes.md`. Allow any Bash command so
          # pipes and redirects work, but keep Write scoped to the two
          # files this step consumes so Claude can't touch anything else
          # in the workspace. The job runs on an ephemeral GitHub-hosted
          # runner and `persist-credentials: false` on the checkout strips
          # the GITHUB_TOKEN from `.git/config`, closing the main
          # exfiltration vector available to an unrestricted Bash; no
          # secrets are exported into this step's environment either.
          claude_args: >-
            --model claude-sonnet-4-6
            --allowed-tools "Bash,Read,Write(/tmp/release-notes.md),Write(/tmp/release-skip-reason)"

      - name: Decide whether to publish
        id: decide
        run: |
          set -euo pipefail
          NOTES_FILE=/tmp/release-notes.md
          SKIP_FILE=/tmp/release-skip-reason
          # Prefer real notes if Claude produced them, even if a skip file
          # was also (erroneously) left behind. The skip branch only wins
          # when there are no notes — that protects against a partially
          # written skip file from a mid-run Claude failure silently
          # suppressing a legitimate release.
          if [ -s "$NOTES_FILE" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
          elif [ -s "$SKIP_FILE" ]; then
            # Strip CR and LF (in case of CRLF endings) and cap the rendered
            # length so a runaway reason can't balloon the job summary.
            REASON=$(tr -d '\r\n' < "$SKIP_FILE" | cut -c1-200)
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=$REASON" >> "$GITHUB_OUTPUT"
            # Write to the step summary rather than emitting `::notice::`:
            # Markdown renders `REASON` as literal text, so a stray `::`
            # sequence in the reason can't be interpreted as a workflow
            # command.
            {
              echo "### Beta release skipped"
              echo
              printf '%s\n' "$REASON"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Beta release skipped: $REASON"
          else
            # Claude produced neither file (the action itself failed, the
            # step timed out, etc.). Fall back to publishing with a stub
            # body — silently swallowing a week of work is worse than
            # publishing notes that need a human follow-up.
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
            printf 'Beta release of YouTrackDB `%s` built from commit `%s`.\n' \
              "${{ steps.coord.outputs.release_tag }}" \
              "${{ steps.vars.outputs.head_sha }}" > "$NOTES_FILE"
            echo "::warning title=Release notes::Claude classify step produced no output, falling back to stub notes"
          fi

      - name: Upload draft release notes
        if: steps.decide.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: /tmp/release-notes.md
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy Maven Artifacts
    needs: classify
    if: needs.classify.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 270
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          # Pin to the SHA the classify job evaluated, so the deployed
          # artifact, the GitHub tag, and the release notes stay
          # consistent even if main moves while the job is queued.
          ref: ${{ needs.classify.outputs.head_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          overwrite-settings: false

      - name: Import GPG signing key
        # Central rejects unsigned release artifacts, so this is a hard
        # prerequisite for the deploy step. Failing fast here gives a
        # clearer error than letting Maven discover a missing key
        # mid-build.
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MAVEN_GPG_PRIVATE_KEY:-}" ]; then
            echo "::error title=Missing GPG secret::MAVEN_GPG_PRIVATE_KEY is not set; cannot sign release artifacts." >&2
            exit 1
          fi
          # `--batch` to suppress prompts; the passphrase is supplied to
          # the maven-gpg-plugin via -Dgpg.passphrase, not to gpg here.
          echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Maven deploy
        # Single deploy to the Central Portal release channel. The
        # `sonatype-oss-release` profile attaches sources + javadoc
        # jars and signs every artifact (Central rejects unsigned
        # releases). With `autoPublish=true` configured on the
        # `central-publishing-maven-plugin` in the root POM, the
        # staged release is promoted automatically once validation
        # passes.
        run: |
          mvn -s .github/workflows/settings.xml clean deploy \
            -P sonatype-oss-release \
            -Dchangelist="${{ needs.classify.outputs.changelist }}" \
            -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE" \
            -Dspotless.check.skip=true -B
          echo "::notice title=Maven Artifact Deployed::${{ needs.classify.outputs.release_tag }}"
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_MIRROR_USERNAME: ${{ secrets.MAVEN_MIRROR_USERNAME }}
          MAVEN_MIRROR_PASSWORD: ${{ secrets.MAVEN_MIRROR_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  deploy-docker:
    name: Deploy Docker Images (${{ matrix.platform.arch }})
    needs: [ classify, deploy ]
    if: needs.classify.outputs.should_publish == 'true'
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            arch: x64
            docker_platform: 'linux/amd64'
          - os: ubuntu-24.04-arm
            arch: arm64
            docker_platform: 'linux/arm64/v8'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.classify.outputs.head_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          overwrite-settings: false

      - name: Docker deploy
        # Tag the published images with the same beta coordinate as the
        # Maven artifact so a Docker tag, a Maven version, and a GitHub
        # release entry are all 1:1.
        run: |
          mvn -s .github/workflows/settings.xml clean deploy -pl console,server -am \
            -Dchangelist="${{ needs.classify.outputs.changelist }}" \
            -Ddocker.username=youtrackdb \
            -Ddocker.tags.latest=latest -Ddocker.password=${{ secrets.DOCKER_PASSWORD }} \
            -P docker-images -Dspotless.check.skip=true \
            -Ddocker.platforms=${{ matrix.platform.docker_platform }} -B
        env:
          MAVEN_MIRROR_USERNAME: ${{ secrets.MAVEN_MIRROR_USERNAME }}
          MAVEN_MIRROR_PASSWORD: ${{ secrets.MAVEN_MIRROR_PASSWORD }}

  create-release:
    name: Create GitHub release tag
    needs: [ classify, deploy, deploy-docker ]
    if: needs.classify.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      # The tag matches the beta-suffixed Maven coordinate that was
      # just published to Central, so every GitHub release is 1:1 with
      # a uniquely addressable artifact.
      RELEASE_TAG: ${{ needs.classify.outputs.release_tag }}
      HEAD_SHA: ${{ needs.classify.outputs.head_sha }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: /tmp

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES_FILE=/tmp/release-notes.md
          if [ ! -s "$NOTES_FILE" ]; then
            # Defensive fallback: the classify job already substitutes a
            # stub when Claude produced nothing, but if the artifact was
            # corrupted in transit we still want to cut the tag.
            printf 'Beta release of YouTrackDB `%s` built from commit `%s`.\n' \
              "$RELEASE_TAG" "$HEAD_SHA" > "$NOTES_FILE"
          fi
          gh release create "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --target "$HEAD_SHA" \
            --title "$RELEASE_TAG" \
            --notes-file "$NOTES_FILE" \
            --prerelease

  notify-failure:
    name: Notify deploy failure on Zulip
    needs: [ classify, deploy, deploy-docker, create-release ]
    if: always() && (needs.classify.result == 'failure' || needs.deploy.result == 'failure' || needs.deploy-docker.result == 'failure' || needs.create-release.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Send Zulip Notification
        uses: zulip/github-actions-zulip/send-message@v1
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: ci-status-bot@youtrackdb.zulipchat.com
          organization-url: 'https://youtrackdb.zulipchat.com'
          to: 'ytdb'
          type: 'stream'
          topic: 'ci status'
          content: |
            **BETA RELEASE FAILED** :rotating_light:
            Beta release failed on branch `${{ github.ref_name }}` for commit ${{ github.sha }} for repo ${{ github.repository }}.
            [View Run Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

  notify-fixed:
    name: Notify deploy fixed on Zulip
    needs: [ classify, deploy, deploy-docker, create-release ]
    # Only treat this as "fixed" if a publish actually happened. A run
    # that classified as infrastructural and skipped doesn't represent
    # a fix — deploy / deploy-docker / create-release would all be
    # `skipped`, which `success()` treats as success but the user
    # shouldn't be notified about.
    if: success() && needs.classify.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Get Previous Run Status
        id: previous_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_conclusion=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --workflow "${{ github.workflow }}" \
            --limit 2 \
            --json conclusion \
            --jq '.[1].conclusion')
          echo "previous_conclusion=$previous_conclusion" >> $GITHUB_OUTPUT

      - name: Send Zulip notification
        if: steps.previous_run.outputs.previous_conclusion == 'failure'
        uses: zulip/github-actions-zulip/send-message@v1
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: ci-status-bot@youtrackdb.zulipchat.com
          organization-url: 'https://youtrackdb.zulipchat.com'
          to: 'ytdb'
          type: 'stream'
          topic: 'ci status'
          content: |
            **BETA RELEASE FIXED** :white_check_mark:
            Beta release fixed on branch `${{ github.ref_name }}` for commit ${{ github.sha }} for repo ${{ github.repository }}.
            [View Run Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
