name: CI Failure Fix Agent
on:
  workflow_dispatch:
    inputs:
      failed_run_url:
        description: 'URL of the failed GitHub Actions workflow run'
        required: true
        type: string
      failed_workflow_name:
        description: 'Name of the failed workflow'
        required: true
        type: string
      trigger_sha:
        description: 'SHA of the commit that triggered the failure'
        required: true
        type: string

concurrency:
  group: ci-failure-fix-agent
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

jobs:
  fix-ci-failure:
    name: Auto-fix CI Failure
    runs-on:
      - self-hosted
      - type-cpx42
      - image-x86-system-ubuntu-24.04
      - in-nbg1-fsn1-hel1
    timeout-minutes: 360
    env:
      FAILED_RUN_URL: ${{ inputs.failed_run_url }}
      FAILED_WORKFLOW_NAME: ${{ inputs.failed_workflow_name }}
      TRIGGER_SHA: ${{ inputs.trigger_sha }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.CI_FIX_AGENT_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
          overwrite-settings: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi

      - name: Configure Git
        run: |
          git config user.name "ci-fix-agent[bot]"
          git config user.email "ci-fix-agent[bot]@users.noreply.github.com"

      - name: Build agent prompt
        id: prompt
        run: |
          cat > /tmp/fix-agent-prompt-$$.md << 'AGENT_PROMPT_EOF'
          You are an autonomous CI failure fix agent running in GitHub Actions.
          There is NO human operator — you must make all decisions independently.

          Your goal: investigate the CI failure, fix it if possible, create a PR
          with the fix, and write a summary report.

          **Key constraints:**
          - You are running on a Hetzner CPX42 Linux x86_64 node with JDK 21,
            Maven, and `gh` CLI available.
          - You have full repository access and can create branches, commit,
            push, and create PRs.
          - There is no user to ask questions — make reasonable decisions
            autonomously.
          - **Time budget: 6 hours total.** Plan accordingly — a full module
            test suite (`./mvnw -pl core clean test`) takes ~20-40 min,
            integration tests take ~60-90 min. Prefer running only the
            specific failing test first, then the full module suite only if
            needed.
          - At the end, write your final summary to `/tmp/fix-agent-summary.md`.
          - If you cannot fix the issue, still write a summary documenting your
            investigation findings.
          - NEVER run multiple test processes simultaneously in the same
            directory.

          ## Step 0: Check for existing fix PRs

          Before any investigation, check whether someone (human or previous
          agent run) has already opened a PR that addresses this failure.

          1. List open PRs targeting `develop`:
             ```bash
             gh pr list --base develop --state open \
               --json number,title,headRefName,body,labels --limit 50
             ```
          2. Look for PRs whose title or body mentions:
             - The failing test class name (extract from the failed run logs)
             - "ci-fix" or "fix ci" or "flaky" keywords
             - A branch name starting with `ci-fix/`
          3. If a matching PR exists:
             - Write a summary to `/tmp/fix-agent-summary.md` noting
               that a fix PR already exists (include PR number and URL).
             - Exit without making changes.
          4. If no matching PR exists, proceed to Step 1.

          ## Step 1: Identify the failure

          1. Use `gh` CLI to fetch the failed workflow run details:
             ```bash
             gh run view {run_id} --json jobs,conclusion,headSha
             ```
          2. Find failed jobs and get their logs:
             ```bash
             gh run view {run_id} --json jobs --jq '.jobs[] | select(.conclusion == "failure") | .databaseId'
             gh run view --job {job_id} --log-failed
             ```
          3. Get check run annotations for exact test names and error messages:
             ```bash
             gh api "repos/{owner}/{repo}/check-runs/{check_run_id}/annotations"
             ```

          ## Step 2: Classify the failure type

          Identify the category before diving into code:

          - **Test failure**: A test assertion or error — go to Step 3.
          - **CI gate failure** (coverage gate, test count gate): A policy
            check failed, not a test. Read PR comments for gate details.
            Understand the gate's threshold and why it triggered — go to
            Step 2a.
          - **Build failure**: Compilation error, dependency issue — read
            build logs.
          - **Infrastructure failure**: Timeout, runner issue, flaky network
            — write a summary noting this is infra-related and skip fix.

          ### Step 2a: Diagnose CI gate failures

          1. Read the gate's PR comment — it has specific data.
          2. Check CLAUDE.md and gate scripts for exact rules.
          3. **Test Count Gate**: Compare baseline vs current per module. A
             big drop usually means tests were excluded by build config
             changes. Trace WHY — don't just bypass.
          4. **Coverage Gate**: Check which lines are uncovered and whether
             existing tests should cover them.
          5. The fix is often in build configuration, not test code.

          ## Step 3: Locate and understand the failing test

          1. Find the test file: `Glob **/{TestClassName}.java`
          2. Read the full test file — understand the failing assertion.
          3. Identify the failure type:
             - Timing/flakiness: race conditions, thread scheduling
             - Logic bug: wrong assertion, incorrect expected value
             - Environment issue: path separators, locale, OS-specific
             - Actual regression: code change broke the test

          ## Step 4: Trace the root cause

          1. Read the production code exercised by the failing test.
          2. Understand the full data flow from code under test to assertion.
          3. Determine if the fix goes in the test or production code:
             - Test asserts a contract production code violates → fix prod
             - Test has overly strict assertion → fix test
          4. For build config issues: trace the Maven profile chain — which
             profile was removed, what did it activate, which `pom.xml`
             depended on it.
          5. Document your root cause analysis before making changes.

          ## Step 5: Apply the fix

          1. Make the minimal change that fixes the root cause.
          2. Add comments explaining **why** the fix is correct.
          3. Update Javadoc for affected methods/classes.
          4. Add Java `assert` statements in production code touched by the
             fix (zero overhead when disabled in production):
             - Preconditions/postconditions at method entry/exit
             - Invariant checks after state mutations
             - Null checks on values that should never be null by contract
             Do NOT add assertions that duplicate existing checks or have
             side effects.
          5. Internal classes under `com.jetbrains.youtrackdb.internal` can
             be refactored for testability, but **never modify the public
             API** under `com.jetbrains.youtrackdb.api`.
          6. Run `./mvnw -pl {module} spotless:apply` to fix formatting.

          ## Step 6: Verify locally

          1. Run the failing test first to confirm the fix:
             ```bash
             ./mvnw -pl {module} clean test -Dtest={TestClass} \
               -Dyoutrackdb.test.env=ci
             ```
          2. If the test requires a suite runner (GremlinProcessRunner, graph
             provider), note it cannot run standalone — verify by inspection.
          3. Run `./mvnw -pl {module} spotless:check` for formatting.
          4. **Run all project unit tests** to ensure no regressions:
             ```bash
             ./mvnw clean package -Dyoutrackdb.test.env=ci
             ```
          5. **Run only the specific integration tests you changed**
             (if any). Use failsafe's `-Dit.test=` to target them:
             ```bash
             ./mvnw -pl {module} clean verify \
               -P ci-integration-tests \
               -Dit.test={ChangedITClass} \
               -Dyoutrackdb.test.env=ci
             ```
             Skip this step if no integration test files were modified.
          6. **Do NOT proceed to Step 7 if any test fails.** Fix the
             failures first and re-run.

          ## Step 7: Dimensional review (MANDATORY GATE)

          **BLOCKING: Do NOT proceed to Step 8 until this step is fully
          complete. Skipping this step is never acceptable — it exists to
          catch bugs in the fix itself before creating a PR.**

          **If you changed any code or added/fixed/changed any tests**, run
          a dimensional code review and test quality review. This step is
          mandatory whenever code or tests were modified.

          1. **Triage — Categorize changes and select relevant agents**

             Before launching agents, perform a quick triage pass over the
             diff to determine which review dimensions are actually relevant.

             **1a: Categorize each changed file**

             Assign one or more categories to every changed file:

             | Category | Signals |
             |---|---|
             | **storage-engine** | Files in `storage/`, `cache/`, `wal/`, `DurableComponent` subclasses, page read/write logic, `DiskStorage`, `WriteCache`, `ReadCache`, `LogSequenceNumber`, double-write log |
             | **concurrency** | `synchronized`, `Lock`, `Atomic*`, `volatile`, `StampedLock`, `ReentrantLock`, thread pools, `ConcurrentHashMap`, `CompletableFuture`, shared mutable state, `@GuardedBy`, `ConcurrentTestHelper`, `CountDownLatch`, `CyclicBarrier` |
             | **crash-durability** | WAL operations, crash simulation, `DurableComponent` recovery, page corruption handling, transaction atomicity under failure, `LogSequenceNumber` manipulation, double-write log, Java `assert` statements in production code |
             | **index-data-structures** | Files in `index/`, B-tree, hash index, `SBTree`, `CellBTree`, histogram, `IndexEngine` |
             | **network-server** | Files in `server/`, `driver/`, Gremlin Server, protocol handling, TLS/SSL, authentication, session management |
             | **sql-query** | Files in `sql/` (excluding `parser/`), query execution, command handlers |
             | **gremlin** | Files in `gremlin/`, traversal steps, `YTDBGraph*` classes, TinkerPop integration |
             | **public-api** | Files in `com.jetbrains.youtrackdb.api`, `YourTracks`, `YouTrackDB` interface |
             | **serialization** | Record serializers, binary format, property map encoding/decoding |
             | **configuration** | `GlobalConfiguration`, config parameters, system properties |
             | **tests-only** | Changes exclusively in test files with no production code changes |
             | **build-config** | `pom.xml`, CI workflows, Maven profiles, Docker configs |
             | **docs-only** | Markdown, documentation, comments-only changes |

             **1b: Select code review agents based on categories**

             | Agent | Launch when ANY of these categories are present |
             |---|---|
             | **review-code-quality** | Always (unless `docs-only` is the ONLY category) |
             | **review-bugs-concurrency** | `concurrency`, `storage-engine`, `index-data-structures`, `network-server`, `serialization`, `gremlin`, `sql-query` |
             | **review-crash-safety** | `crash-durability` |
             | **review-security** | `network-server`, `public-api`, `sql-query`, `serialization`, `configuration`, OR new dependencies in `pom.xml` |
             | **review-performance** | `storage-engine`, `index-data-structures`, `concurrency`, `serialization`, `sql-query`, `gremlin` |

             **1c: Select test quality agents based on categories**

             | Agent | When to launch |
             |---|---|
             | **review-test-behavior** | Always (unless `docs-only` or `build-config` are the ONLY categories) |
             | **review-test-completeness** | Always (unless `docs-only` or `build-config` are the ONLY categories) |
             | **review-test-structure** | Any test files are changed |
             | **review-test-concurrency** | `concurrency`, OR production code touches shared mutable state / threading primitives even if no concurrency tests exist yet |
             | **review-test-crash-safety** | `crash-durability` |

             **1d: Log your triage decision** before launching agents.

             **1e: Edge cases**
             - All `docs-only`: skip all agents, report no code review needed.
             - All `build-config`: launch `review-code-quality` and `review-security` (dependency changes).
             - All `tests-only`: launch `review-code-quality`, `review-bugs-concurrency`, `review-test-behavior`, `review-test-completeness`, `review-test-structure`.
             - If in doubt: **launch the agent**. False positives > false negatives.

          2. **Launch selected review agents in parallel** (fresh sub-agents).

             Each agent receives the same context:
             ```
             ## Review Target
             CI fix: {brief description of the fix}
             Reviewing: changes on current branch vs develop

             ## Changed Files
             {git diff develop...HEAD --name-only}

             ## Skip These Files (generated code)
             - core/.../sql/parser/*, generated-sources/*, Gremlin DSL

             ## Diff
             {git diff develop...HEAD}
             ```

          3. **Synthesize findings**: After all selected agents complete,
             deduplicate across dimensions. Prioritize:
             blocker > should-fix > suggestion.

          4. Address all **blocker** and **should-fix** findings:
             - Fix code quality, bug, safety, security, and performance issues
             - Add missing behavior assertions flagged by the test quality reviewer
             - Add corner case tests for gaps identified
             - Add recommended `assert` statements in production code (zero-overhead)
             - Fix any test isolation, readability, or precision issues

          5. After applying fixes, run `./mvnw -pl {module} spotless:apply`
             and re-run the affected tests to confirm they pass.

          6. **Re-run only the agent(s) with open findings** on the updated
             changes.

          7. **Repeat steps 4-6** until no blocker/should-fix findings remain.
             Maximum 3 iterations. If after 3 rounds there are still critical
             issues, document them in the summary and proceed.

          8. **Final full test run after review loop completes.**
             After the review loop exits (all findings addressed or max
             iterations reached), run the full build with all tests
             (unit + integration) one final time:
             ```bash
             ./mvnw clean verify -P ci-integration-tests \
               -Dyoutrackdb.test.env=ci
             ```
             If any test fails, fix the failure, re-run `spotless:apply`,
             and re-run the suite. Do NOT proceed to Step 8 with
             failing tests.

          ## Step 8: Commit, push, and create PR

          1. Create a fix branch:
             ```bash
             git checkout -b ci-fix/$(date +%Y%m%d-%H%M%S) develop
             ```
          2. Stage and commit with a descriptive message:
             ```bash
             git add <changed-files>
             git commit -m "$(cat <<'EOF'
             Fix <test/gate> failure in <module>

             <Why the failure happened and what was changed>
             EOF
             )"
             ```
          3. Push and create PR:
             ```bash
             git push -u origin HEAD
             gh pr create --base develop \
               --title "Fix <description>" \
               --body "$(cat <<'EOF'
             ## Summary
             - <what was fixed and why>

             ## Motivation
             CI failure on develop: <failed_run_url>

             ## Test plan
             - [ ] Failing test passes locally
             - [ ] No other tests broken
             EOF
             )"
             ```
          4. If no code changes are needed (infra issue, already fixed),
             skip PR creation.

          ## Step 9: Write summary report

          Write your final summary to `/tmp/fix-agent-summary.md`:

          ```markdown
          ## Status
          <!-- One of: FIX_PR_CREATED, EXISTING_PR_FOUND, NO_FIX_NEEDED,
               INVESTIGATION_ONLY -->
          <status>

          ## Problem
          <exact failure: test name, error message, CI link>

          ## Root Cause
          <why it failed — detailed technical explanation>

          ## Fix Applied
          <what was changed and why, or "No changes needed">

          ## PR
          <PR URL or "No PR created" with reason>
          ```

          ## Important Rules

          - Always use `gh` CLI for GitHub API, not WebFetch.
          - Read before editing — always read full test and production code.
          - Minimal changes — fix root cause, don't refactor surroundings.
          - Don't blindly relax assertions — understand why they fail first.
          - Don't bypass CI gates without understanding why tests disappeared.
          - Build config changes have test side effects — check Maven profiles.
          - NEVER run multiple test processes simultaneously.
          - Add `assert` statements generously in production code (zero cost).
          - Internal classes may be refactored for testability, never public API.
          - Dimensional review is mandatory after any code/test change — triage the diff to select relevant agents, don't launch all 10 unconditionally.

          ## YouTrackDB-Specific Knowledge

          ### CI Gates
          - **Test Count Gate**: per-module comparison against git notes
            baseline. Fails if any module drops >5%.
          - **Coverage Gate**: 85% line / 70% branch on changed code.

          ### Common Patterns
          - **Profile-gated tests**: Some modules exclude heavyweight tests
            by default; `ci-integration-tests` profile includes them via
            `<excludes combine.self="override"/>`.
          - **Surefire vs Failsafe**: Unit tests = surefire (`test` phase),
            integration tests = failsafe (`verify` + `-P ci-integration-tests`).
          - **Embedded Cucumber tests**: ~1900 TinkerPop Gremlin scenarios,
            requires 4GB heap.
          AGENT_PROMPT_EOF

          # Append the dynamic inputs
          cat >> /tmp/fix-agent-prompt-$$.md << EOF

          ---
          ## Failed Workflow Details

          - **Failed run URL**: ${FAILED_RUN_URL}
          - **Failed workflow name**: ${FAILED_WORKFLOW_NAME}
          - **Commit SHA**: ${TRIGGER_SHA}
          EOF

          echo "prompt_file=/tmp/fix-agent-prompt-$$.md" >> "$GITHUB_OUTPUT"

      - name: Run Fix Agent
        id: run-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.CI_FIX_AGENT_TOKEN }}
          MAVEN_MIRROR_USERNAME: ${{ secrets.MAVEN_MIRROR_USERNAME }}
          MAVEN_MIRROR_PASSWORD: ${{ secrets.MAVEN_MIRROR_PASSWORD }}
        run: |
          JSON_LOG="/tmp/fix-agent-json-log-$(uuidgen).jsonl"

          # stream-json puts ALL output (including --verbose) on stdout
          # as JSON — there is no separate stderr stream.
          # tee saves the full JSON to a file (uploaded as artifact),
          # jq parses each line as raw text, attempts JSON decode, and
          # extracts human-readable tokens in real time for the CI log.
          # pipefail is disabled so a jq/tee error or claude crash
          # does not kill the step before we capture the JSON log path.
          set +o pipefail

          claude -p "$(cat "${{ steps.prompt.outputs.prompt_file }}")" \
            --dangerously-skip-permissions \
            --model opus \
            --output-format stream-json \
            --verbose \
            2>&1 | tee "$JSON_LOG" | \
            jq -Rrj --unbuffered '
              try (fromjson |
                if .type == "content_block_delta" then
                  if .delta.text then .delta.text
                  else ""
                  end
                elif .type == "content_block_start" then
                  if .content_block.type == "tool_use" then
                    "\n\n--- Tool: \(.content_block.name // "unknown") ---\n"
                    + if .content_block.input then
                        (.content_block.input | tostring) + "\n"
                      else ""
                      end
                  else ""
                  end
                elif .type == "message_start" then
                  "\n=== \(.message.role // "message") ===\n\n"
                elif .type == "result" then
                  "\n=== Final Result ===\n" + (.result // "(no text)") + "\n"
                else ""
                end
              ) catch empty
            '

          set -o pipefail

          echo "json_log=$JSON_LOG" >> "$GITHUB_OUTPUT"
          echo "Agent finished. JSON log: $(wc -c < "$JSON_LOG" 2>/dev/null || echo 0) bytes"

      - name: Upload agent JSON log
        if: always() && steps.run-agent.outputs.json_log != ''
        uses: actions/upload-artifact@v4
        with:
          name: fix-agent-json-log
          path: ${{ steps.run-agent.outputs.json_log }}
          retention-days: 30
          if-no-files-found: warn

      - name: Prepare Zulip summary
        id: summary
        if: always()
        run: |
          if [ -f /tmp/fix-agent-summary.md ]; then
            SUMMARY=$(head -c 3000 /tmp/fix-agent-summary.md)
          else
            SUMMARY="Agent completed without writing a structured summary. Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

          # Write to file for the Zulip step (avoids escaping issues)
          cat > /tmp/zulip-message-$$.md <<EOF
          **CI Fix Agent Report** :robot:
          Investigated failure in **${FAILED_WORKFLOW_NAME}** for commit \`${TRIGGER_SHA}\`.
          [Failed Run](${FAILED_RUN_URL}) | [Agent Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ${SUMMARY}
          EOF

          echo "zulip_message_file=/tmp/zulip-message-$$.md" >> "$GITHUB_OUTPUT"

      - name: Send Zulip summary
        if: always()
        env:
          ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
        run: |
          MESSAGE_FILE="${{ steps.summary.outputs.zulip_message_file }}"
          if [ ! -f "$MESSAGE_FILE" ]; then
            MESSAGE_FILE="/tmp/zulip-fallback-$$.md"
            echo "**CI Fix Agent Report** :robot: — agent produced no summary. Check [logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})." > "$MESSAGE_FILE"
          fi

          curl -s -X POST "https://youtrackdb.zulipchat.com/api/v1/messages" \
            -u "ci-status-bot@youtrackdb.zulipchat.com:${ZULIP_API_KEY}" \
            --data-urlencode type=stream \
            --data-urlencode to=ytdb \
            --data-urlencode topic="ci status" \
            --data-urlencode "content@${MESSAGE_FILE}"
