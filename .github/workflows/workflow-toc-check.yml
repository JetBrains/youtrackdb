name: Workflow TOC check

# Validates `.claude/workflow/**`, `.claude/skills/**`, and `.claude/agents/**`
# Markdown files against the per-section TOC + role/phase annotation schema
# defined in `.claude/workflow/conventions.md §1.8`. The same script runs
# locally as part of `.githooks/pre-commit`; this workflow is the remote
# safety net for PRs that bypass the local hook (forks without the hook
# installed, `--no-verify` commits, etc.).
#
# The path filter keeps runtime under ~10 seconds on PRs that actually
# touch workflow content. PRs that never touch a workflow file do not
# trigger this workflow.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.claude/**/*.md'
      - '.githooks/pre-commit'
      - '.github/workflows/workflow-toc-check.yml'
      - 'docs/adr/**/_workflow/staged-workflow/.claude/**/*.md'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  toc-check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      # This gate reports ~1500 findings against the un-annotated live
      # workflow tree until the universal per-section annotation rollout
      # and the bootstrap-block insertion across system-prompt files
      # both land on develop (per YTDB-1023's acceptance criteria). Until
      # then, treat the gate as informational on PRs that touch workflow
      # content; reviewers should not block on it. The gate becomes
      # load-bearing the moment the annotation rollout commit reaches
      # develop — at that point a non-zero finding count means the diff
      # broke the schema and the gate refuses to merge.
      - name: Validate workflow TOC + annotations
        run: python3 .claude/scripts/workflow-reindex.py --check
