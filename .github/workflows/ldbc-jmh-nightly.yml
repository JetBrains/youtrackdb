name: LDBC JMH Nightly Benchmark

permissions:
  contents: read
  actions: write

on:
  schedule:
    # Run at 3 AM CET (2 AM UTC), after nightly integration tests
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to benchmark'
        required: false
        default: 'develop'
      use_prebuilt_db:
        description: 'Use pre-built DB from S3 (skip CSV loading). Nightly always loads fresh.'
        required: false
        type: boolean
        default: true

concurrency:
  group: ldbc-jmh-nightly
  cancel-in-progress: false

env:
  LDBC_SCALE_FACTOR: '1'

jobs:
  benchmark:
    runs-on: [self-hosted, Linux, X64, embedded-jmh-benchmark-baremetal]
    timeout-minutes: 720

    steps:
      - name: Clean workspace
        run: |
          rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.??* || true
          rm -f /tmp/dataset.tar.zst /tmp/dataset.tar \
                /tmp/bench-db.tar.zst /tmp/bench-db.tar

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || 'develop' }}
          fetch-depth: 1

      - name: Get commit info
        id: commit
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Determine load mode
        id: mode
        run: |
          # Nightly (schedule) always loads fresh from CSV.
          # Manual (workflow_dispatch) uses pre-built DB by default.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "load=csv" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.use_prebuilt_db }}" = "true" ]; then
            echo "load=prebuilt" >> "$GITHUB_OUTPUT"
          else
            echo "load=csv" >> "$GITHUB_OUTPUT"
          fi

      - name: Install CLI tools (mc, jq)
        run: |
          # Install MinIO client (static binary, no Python/pip needed)
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc \
            || curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/mc"
          chmod +x /usr/local/bin/mc 2>/dev/null || chmod +x "$HOME/mc"
          # Ensure mc is on PATH
          if ! command -v mc &>/dev/null; then
            export PATH="$HOME:$PATH"
            echo "$HOME" >> "$GITHUB_PATH"
          fi

          # Install jq if not present (needed for InfluxDB push)
          if ! command -v jq &>/dev/null; then
            curl -fsSL https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 \
              -o /usr/local/bin/jq \
              || curl -fsSL https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 \
                -o "$HOME/jq"
            chmod +x /usr/local/bin/jq 2>/dev/null || chmod +x "$HOME/jq"
            if ! command -v jq &>/dev/null; then
              echo "$HOME" >> "$GITHUB_PATH"
            fi
          fi

          mc alias set hetzner "${{ secrets.HETZNER_S3_ENDPOINT }}" \
            "${{ secrets.HETZNER_S3_ACCESS_KEY }}" "${{ secrets.HETZNER_S3_SECRET_KEY }}"
          mc ls hetzner/bench-cache/ldbc/ || echo "Warning: could not list S3 bucket"

      - name: Download LDBC CSV dataset from S3
        if: steps.mode.outputs.load == 'csv'
        run: |
          echo 'Downloading SF 1 CSV dataset from S3...'
          mc cp hetzner/bench-cache/ldbc/ldbc-sf1-composite-merged-fk.tar.zst /tmp/dataset.tar.zst
          echo 'Downloaded from S3'

          mkdir -p jmh-ldbc/target/ldbc-dataset/sf1
          cd jmh-ldbc/target/ldbc-dataset/sf1
          zstd -d /tmp/dataset.tar.zst -o /tmp/dataset.tar
          tar xf /tmp/dataset.tar
          rm -f /tmp/dataset.tar.zst /tmp/dataset.tar
          echo "CSV dataset extracted"
          ls -la static/ dynamic/

      - name: Download pre-built LDBC database from S3
        if: steps.mode.outputs.load == 'prebuilt'
        run: |
          echo 'Downloading pre-built SF 1 database from S3...'
          mc cp hetzner/bench-cache/ldbc/ldbc-sf1-bench-db.tar.zst /tmp/bench-db.tar.zst
          echo 'Downloaded from S3'

          mkdir -p jmh-ldbc/target/ldbc-bench-db
          cd jmh-ldbc/target/ldbc-bench-db
          zstd -d /tmp/bench-db.tar.zst -o /tmp/bench-db.tar
          tar xf /tmp/bench-db.tar
          rm -f /tmp/bench-db.tar.zst /tmp/bench-db.tar
          echo "Pre-built database extracted"
          ls -la

      - name: Compile
        run: |
          chmod +x mvnw
          ./mvnw -pl jmh-ldbc -am compile -DskipTests -Dspotless.check.skip=true -q

      - name: Pre-load LDBC database
        if: steps.mode.outputs.load == 'csv'
        run: |
          ./mvnw -pl jmh-ldbc -am verify -P bench -DskipTests \
            -Dspotless.check.skip=true -Dcentral.skip=true \
            -Djmh.args="LdbcSingleThreadIC.*ic5_newGroups -f 0 -wi 0 -i 1 -r 1s -t 1"

      - name: Warm OS page cache
        run: |
          ./mvnw -pl jmh-ldbc -am verify -P bench -DskipTests \
            -Dspotless.check.skip=true -Dcentral.skip=true \
            -Djmh.args="-f 0 -wi 0 -i 1 -r 5s -t 1"

      - name: Run benchmarks
        run: |
          ./mvnw -pl jmh-ldbc -am verify -P bench -DskipTests \
            -Dspotless.check.skip=true -Dcentral.skip=true \
            -Djmh.args="-rf json -rff ${{ github.workspace }}/results.json" \
            2>&1 | tee bench.log

      - name: Upload built database to S3
        if: success() && steps.mode.outputs.load == 'csv'
        run: |
          set -euo pipefail
          cd jmh-ldbc/target/ldbc-bench-db
          tar cf /tmp/bench-db.tar .
          zstd -9 /tmp/bench-db.tar -o /tmp/bench-db.tar.zst
          rm -f /tmp/bench-db.tar
          echo "Database archived: $(du -sh /tmp/bench-db.tar.zst | cut -f1)"

          echo 'Uploading built database to S3...'
          mc cp /tmp/bench-db.tar.zst hetzner/bench-cache/ldbc/ldbc-sf1-bench-db.tar.zst
          echo 'Uploaded to S3: ldbc/ldbc-sf1-bench-db.tar.zst'

      - name: Push results to InfluxDB
        if: success()
        env:
          INFLUXDB_URL: ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
        run: |
          bash jmh-ldbc/jmh-to-influxdb.sh \
            --input results.json \
            --influxdb-url "$INFLUXDB_URL" \
            --influxdb-token "$INFLUXDB_TOKEN" \
            --influxdb-org youtrackdb \
            --influxdb-bucket jmh-benchmarks \
            --branch "${{ steps.commit.outputs.branch }}" \
            --commit-sha "${{ steps.commit.outputs.sha }}" \
            --timestamp "${{ steps.commit.outputs.timestamp }}"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jmh-results-${{ steps.commit.outputs.short_sha }}-${{ github.run_id }}
          path: results.json
          retention-days: 90

      - name: Clean up temp files
        if: always()
        run: |
          rm -f /tmp/dataset.tar.zst /tmp/dataset.tar \
                /tmp/bench-db.tar.zst /tmp/bench-db.tar
