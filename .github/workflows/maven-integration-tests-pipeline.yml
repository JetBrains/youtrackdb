name: Java CI/CD Integration Tests Pipeline
on:
  workflow_dispatch:
  push:
    branches: [ "develop" ]
  schedule:
    # Run at 2 AM CET (1 AM UTC)
    - cron: '0 1 * * *'

# Concurrency policy is trigger-dependent:
#   - push / schedule: cancel-in-progress=false. A new run does NOT kill the
#     running build; it becomes "pending" and starts only after the current
#     build finishes. GitHub keeps at most one pending run per group, so a
#     burst of pushes collapses to the latest commit — the queued run checks
#     out the develop tip, so it always tests the last change.
#   - workflow_dispatch: cancel-in-progress=true. A manual trigger cancels the
#     in-progress (and any pending) run and starts immediately.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

permissions:
  contents: write
  packages: write
  actions: write
  checks: write
jobs:
  check-changes:
    name: Check for Code Changes
    runs-on: ubuntu-latest
    # Define outputs so the next job can read them
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      # Range boundaries for the YouTrack fixed-notifier: the SHA this run
      # tested/deployed, and the SHA of the previous successful deploy.
      current_sha: ${{ steps.check.outputs.current_sha }}
      last_success_sha: ${{ steps.check.outputs.last_success_sha }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'develop' }}
          # We only need the tip (depth 1) to get the current SHA. Very fast.
          fetch-depth: 1
      - name: Check against last successful run
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. If this is a manual trigger, always run.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual trigger detected. Force run."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 2. Get the current commit SHA (on develop)
          CURRENT_SHA=$(git rev-parse HEAD)

          # 3. Get the SHA of the LAST SUCCESSFUL run of THIS specific workflow on 'develop'
          # We use the GitHub CLI (gh) to look up workflow history
          LAST_SUCCESS_SHA=$(gh run list --branch develop \
            --workflow "Java CI/CD Integration Tests Pipeline" \
            --status success \
            --limit 1 \
            --json headSha \
            -q '.[0].headSha')

          echo "Current SHA: $CURRENT_SHA"
          echo "Last Success SHA: $LAST_SUCCESS_SHA"

          # Expose both SHAs so the post-deploy update-youtrack job can
          # diff the commit range "since the last successful deploy".
          echo "current_sha=$CURRENT_SHA" >> $GITHUB_OUTPUT
          echo "last_success_sha=$LAST_SUCCESS_SHA" >> $GITHUB_OUTPUT

          # 4. Compare
          if [ "$CURRENT_SHA" == "$LAST_SUCCESS_SHA" ]; then
            echo "The current commit has already been successfully tested."
            echo "Skipping tests to save resources."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "New code detected (or no previous success found). Proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  test-linux:
    name: Linux ${{ matrix.arch }} - JDK ${{ matrix.java }} - ${{ matrix.distribution }}
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 600
    strategy:
      fail-fast: false
      matrix:
        java: [ '21', '25' ]
        distribution: [ 'temurin' ]
        arch: [ 'x86', 'arm' ]
        include:
          - arch: x86
            # Powerful self-hosted Hetzner runner: full job — integration tests
            # (clean verify) plus the multi-arch Docker image build.
            runs_on: [ self-hosted, type-cpx42, image-x86-system-ubuntu-24.04, in-nbg1-fsn1-hel1 ]
            maven_goals: 'clean verify'
            mvn_opts: '-Dmaven.test.failure.ignore=true -P ci-integration-tests -P docker-images -Ddocker.platforms=linux/amd64'
            java_arch: x64
          - arch: arm
            # GitHub-hosted runner — Hetzner ARM capacity is scarce. This runner
            # is weak, like windows-latest, so it runs the light test build: clean
            # package with unit tests only, no failsafe integration-test/verify
            # phase. The Docker image build is bound to the package phase, so it
            # still produces the arm64 image without running integration tests.
            runs_on: ubuntu-24.04-arm
            maven_goals: 'clean package'
            mvn_opts: '-Dmaven.test.failure.ignore=true -P ci-integration-tests -P docker-images -Ddocker.platforms=linux/arm64/v8'
            java_arch: aarch64
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'develop' }}
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.distribution }}
          architecture: ${{ matrix.java_arch }}
          overwrite-settings: false

      - name: Run Maven Test
        id: tests
        run: ./mvnw -s .github/workflows/settings.xml ${{ matrix.maven_goals }} -B ${{ matrix.mvn_opts }}
        env:
          MAVEN_MIRROR_USERNAME: ${{ secrets.MAVEN_MIRROR_USERNAME }}
          MAVEN_MIRROR_PASSWORD: ${{ secrets.MAVEN_MIRROR_PASSWORD }}

      - name: Print VMLens Data Race Report
        if: always()
        run: |
          REPORT_DIR="core/target/vmlens-report"
          if [ -d "$REPORT_DIR" ]; then
            echo "::group::VMLens Data Race Report"
            echo "Report files:"
            find "$REPORT_DIR" -type f | sort
            echo ""
            for f in "$REPORT_DIR"/*.html; do
              [ -f "$f" ] || continue
              echo "=== $(basename "$f") ==="
              # Strip HTML tags for readable log output
              sed 's/<[^>]*>//g; s/&nbsp;/ /g; s/&lt;/</g; s/&gt;/>/g; s/&amp;/\&/g' "$f" \
                | sed '/^[[:space:]]*$/d'
              echo ""
            done
            echo "::endgroup::"
          else
            echo "No VMLens report directory found at $REPORT_DIR"
          fi
      - name: Upload VMLens Report
        uses: actions/upload-artifact@v7
        if: "!cancelled()"
        with:
          name: vmlens-report-linux-${{ matrix.arch }}-jdk${{ matrix.java }}-${{ matrix.distribution }}
          path: 'core/target/vmlens-report/'
          if-no-files-found: ignore
          retention-days: 30
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/target/surefire-reports/TEST-*.xml
            **/target/failsafe-reports/TEST-*.xml
          action_fail: true
          large_files: true
          comment_mode: off
          compare_to_earlier_commit: false
          check_name: Integration Tests Results (Linux ${{ matrix.arch }}, JDK ${{ matrix.java }} - ${{ matrix.distribution }})
      - name: Upload Test Diagnostics
        uses: actions/upload-artifact@v7
        if: "!cancelled()"
        with:
          name: test-diagnostics-integration-linux-${{ matrix.arch }}-jdk${{ matrix.java }}-${{ matrix.distribution }}
          path: |
            **/target/deadlock-report.txt
            **/target/surefire-reports/*.dumpstream
            **/target/surefire-reports/*.dump
          retention-days: 7
          if-no-files-found: ignore

  test-windows:
    name: Windows x64 - JDK ${{ matrix.java }} - ${{ matrix.distribution }}
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '21', '25' ]
        distribution: [ 'temurin' ]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'develop' }}
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.distribution }}
          architecture: x64
          cache: 'maven'
          overwrite-settings: false

      - name: Run Maven Test
        id: tests
        shell: bash
        run: ./mvnw -s .github/workflows/settings.xml clean package -B -Dmaven.test.failure.ignore=true -P ci-integration-tests
        env:
          MAVEN_MIRROR_USERNAME: ${{ secrets.MAVEN_MIRROR_USERNAME }}
          MAVEN_MIRROR_PASSWORD: ${{ secrets.MAVEN_MIRROR_PASSWORD }}

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          files: |
            **/target/surefire-reports/TEST-*.xml
            **/target/failsafe-reports/TEST-*.xml
          action_fail: true
          large_files: true
          comment_mode: off
          compare_to_earlier_commit: false
          check_name: Integration Tests Results (Windows x64, JDK ${{ matrix.java }} - ${{ matrix.distribution }})
      - name: Upload Test Diagnostics
        uses: actions/upload-artifact@v7
        if: "!cancelled()"
        with:
          name: test-diagnostics-integration-windows-jdk${{ matrix.java }}-${{ matrix.distribution }}
          path: |
            **/target/deadlock-report.txt
            **/target/surefire-reports/*.dumpstream
            **/target/surefire-reports/*.dump
          retention-days: 7
          if-no-files-found: ignore

  merge-to-main:
    name: Merge develop into main
    needs: [ test-linux, test-windows ]
    if: success() && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.MAIN_UPDATE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify branches are aligned for fast-forward
        run: |
          git fetch origin develop

          # Check if main is an ancestor of develop (required for fast-forward)
          if ! git merge-base --is-ancestor origin/main origin/develop; then
            echo "ERROR: main branch contains commits not present in develop."
            echo "Fast-forward merge is not possible. Branches have diverged."
            echo ""
            echo "Commits in main not in develop:"
            git log origin/develop..origin/main --oneline
            exit 1
          fi

          echo "Verification passed: main is an ancestor of develop, fast-forward is possible."

      - name: Merge develop into main (fast-forward only)
        run: |
          git merge origin/develop --ff-only
          git push origin main

  # ------------------------------------------------------------------
  # JOB: DEPLOY
  # Publishes artifacts to Maven Central, gated on the integration
  # tests passing. Runs on develop pushes and manual dispatch only
  # (skipped on the nightly schedule). Parallel to merge-to-main; both
  # depend on test-linux + test-windows. Uses JDK 21.
  # ------------------------------------------------------------------
  deploy:
    name: Deploy Artifacts
    needs: [ test-linux, test-windows ]
    if: success() && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # The timestamped coordinate is the uniquely addressable artifact just
    # published; update-youtrack quotes it in the "Fixed in <version>" comment.
    outputs:
      version: ${{ steps.deployed.outputs.version }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          # Always publish develop. A workflow_dispatch run must not be able to
          # publish an arbitrary branch or tag to Maven Central under the
          # project's coordinates, so the ref is pinned regardless of trigger.
          ref: 'develop'

      - name: Set Short SHA and Timestamp
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y%m%d.%H%M%S')" >> $GITHUB_OUTPUT

      - name: Set up JDK 21 settings
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          overwrite-settings: false
      - name: Maven deploy
        #1. Deploy to Maven Central as -dev-SNAPSHOT
        #2. Deploy to Maven Central with -TIMESTAMP-SHA-dev-SNAPSHOT suffix (sortable by date)
        run: |
          mvn -s .github/workflows/settings.xml clean deploy -Dchangelist=-dev-SNAPSHOT -DskipTests -Dspotless.check.skip=true -B
          mvn -s .github/workflows/settings.xml clean deploy -Dchangelist=-dev-SNAPSHOT -Dsha1=-${{ steps.vars.outputs.timestamp }}-${{ steps.vars.outputs.sha_short }} -DskipTests=true -Dspotless.check.skip=true -B
        env:
          # Credentials mapped to environment variables
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_MIRROR_USERNAME: ${{ secrets.MAVEN_MIRROR_USERNAME }}
          MAVEN_MIRROR_PASSWORD: ${{ secrets.MAVEN_MIRROR_PASSWORD }}

      - name: Annotate deployed versions
        id: deployed
        run: |
          VERSION_SNAPSHOT=$(mvn -s .github/workflows/settings.xml help:evaluate -Dexpression=project.version -Dchangelist=-dev-SNAPSHOT -q -DforceStdout)
          VERSION_SHA=$(mvn -s .github/workflows/settings.xml help:evaluate -Dexpression=project.version -Dchangelist=-dev-SNAPSHOT -Dsha1=-${{ steps.vars.outputs.timestamp }}-${{ steps.vars.outputs.sha_short }} -q -DforceStdout)
          echo "::notice title=Maven Artifact Deployed::${VERSION_SNAPSHOT}"
          echo "::notice title=Maven Artifact Deployed::${VERSION_SHA}"
          # Hand the timestamped coordinate to the update-youtrack job.
          echo "version=${VERSION_SHA}" >> "$GITHUB_OUTPUT"
        env:
          MAVEN_MIRROR_USERNAME: ${{ secrets.MAVEN_MIRROR_USERNAME }}
          MAVEN_MIRROR_PASSWORD: ${{ secrets.MAVEN_MIRROR_PASSWORD }}

  # ------------------------------------------------------------------
  # JOB: UPDATE-YOUTRACK
  # After a successful deploy, walk the commits "since the last
  # successful deploy" and, for every YTDB issue referenced in a commit
  # title, post a "Fixed in <version>" comment and move the issue to the
  # Fixed state. Issues already in a resolved state are skipped, so a
  # Verified/Closed issue is never re-opened and re-runs are idempotent.
  #
  # Push-only: a manual workflow_dispatch deploys an artifact but must not
  # mutate the issue tracker (it may target an arbitrary develop commit,
  # and the range math assumes the linear push history). Skipped entirely
  # on the first run / when no prior successful deploy exists, and when
  # the current commit equals the last successful one.
  #
  # A failure here does NOT fire the build-failure siren and does NOT
  # dispatch the CI Fix Agent (a sync failure is operational — token /
  # API / rejected transition — not a code or test bug the agent can
  # fix), nor does it suppress the "build fixed" signal. Instead the
  # dedicated notify-youtrack-failure job below pages 'ci status' at low
  # severity, and the job's own red status shows in the Actions UI.
  # ------------------------------------------------------------------
  update-youtrack:
    name: Mark fixed issues in YouTrack
    needs: [ check-changes, deploy ]
    if: >-
      success() &&
      github.event_name == 'push' &&
      needs.check-changes.outputs.last_success_sha != '' &&
      needs.check-changes.outputs.last_success_sha != needs.check-changes.outputs.current_sha
    runs-on: ubuntu-latest
    # Least privilege: the only write target is YouTrack (via YOUTRACK_TOKEN).
    # checkout needs read access to clone the range; nothing here uses the
    # GITHUB_TOKEN write scopes granted at the workflow level.
    permissions:
      contents: read
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          # Pin to the exact commit this run deployed so the range end
          # matches the published artifact, and fetch full history so the
          # last-success SHA is reachable for the git-log diff.
          ref: ${{ needs.check-changes.outputs.current_sha }}
          fetch-depth: 0

      - name: Mark fixed issues in YouTrack
        env:
          YOUTRACK_TOKEN: ${{ secrets.YOUTRACK_TOKEN }}
          # Pass run inputs through env rather than interpolating ${{ }} into the
          # run: shell, so a value can never be expanded as shell syntax (the
          # GitHub-recommended pattern for untrusted-or-derived expansions).
          FROM_SHA: ${{ needs.check-changes.outputs.last_success_sha }}
          TO_SHA: ${{ needs.check-changes.outputs.current_sha }}
          DEPLOYED_VERSION: ${{ needs.deploy.outputs.version }}
        run: |
          python3 .github/scripts/youtrack-fixed-notifier.py \
            --from-sha "$FROM_SHA" \
            --to-sha "$TO_SHA" \
            --version "$DEPLOYED_VERSION"

  notify-failure:
    name: Notify build failure on Zulip
    needs: [ test-linux, test-windows, merge-to-main, deploy ]
    if: >-
      always() &&
      github.event_name != 'workflow_dispatch' &&
      (
        needs.test-linux.result == 'failure' ||
        needs.test-windows.result == 'failure' ||
        needs.merge-to-main.result == 'failure' ||
        needs.deploy.result == 'failure'
      )
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE the broader workflow-level block (contents,
    # packages, actions, checks: write) that other jobs in this file need. This
    # job only dispatches the CI Fix Agent via gh workflow run (actions: write)
    # and posts a Zulip message, so actions: write is the complete minimal set.
    permissions:
      actions: write
    steps:
      - name: Dispatch CI Fix Agent
        if: >-
          needs.test-linux.result == 'failure' ||
          needs.test-windows.result == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci-failure-fix-agent.yml \
            --repo "${{ github.repository }}" \
            -f failed_run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f failed_workflow_name="${{ github.workflow }}" \
            -f trigger_sha="${{ github.sha }}"
      - name: Send Zulip Notification
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: ci-status-bot@youtrackdb.zulipchat.com
          organization-url: 'https://youtrackdb.zulipchat.com'
          to: 'ytdb'
          type: 'stream'
          topic: 'ci status'
          content: |
            **BUILD FAILED** :rotating_light:
            Integration tests or merge failed on branch `${{ github.ref_name }}` for commit ${{ github.sha }} for repo ${{ github.repository }}.
            [View Run Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            :robot: Automated fix agent has been dispatched and is investigating...

  notify-youtrack-failure:
    name: Notify YouTrack sync failure on Zulip
    needs: [ update-youtrack ]
    # The deploy itself succeeded; only the post-deploy YouTrack issue
    # sync (comment + State transition) failed. This is operational —
    # token expired or under-scoped, YouTrack API down, or a State
    # transition rejected — not a code/test regression, so we page at low
    # severity (:warning:) and never dispatch the CI Fix Agent. always()
    # is required so this job still runs after its dependency failed;
    # update-youtrack only runs on push, so its result is 'failure' only
    # in that context (it is 'skipped' on dispatch / schedule).
    if: always() && needs.update-youtrack.result == 'failure'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send Zulip Notification
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: ci-status-bot@youtrackdb.zulipchat.com
          organization-url: 'https://youtrackdb.zulipchat.com'
          to: 'ytdb'
          type: 'stream'
          topic: 'ci status'
          content: |
            **YOUTRACK SYNC FAILED** :warning:
            Deploy succeeded, but marking fixed issues in YouTrack failed on branch `${{ github.ref_name }}` for commit ${{ github.sha }} (repo ${{ github.repository }}). Likely a token/permissions issue, a YouTrack API outage, or a rejected State transition — the build and published artifact are fine and no code fix is needed. Re-running the workflow retries the commit range; already-resolved issues are skipped, so successfully-updated issues are not touched twice.
            [View Run Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

  notify-fixed:
    name: Notify build fixed on Zulip
    # deploy IS included so a deploy failure suppresses the "fixed" signal —
    # we must never report "build fixed" while artifact publishing is broken
    # (a deploy-only failure already triggers notify-failure). deploy is
    # skipped on the nightly schedule, but a skipped need does not make
    # success() false, so the fixed signal still fires on scheduled runs.
    needs: [ test-linux, test-windows, merge-to-main, deploy ]
    if: success() && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Get Previous Run Status
        id: previous_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_conclusion=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --workflow "${{ github.workflow }}" \
            --limit 2 \
            --json conclusion \
            --jq '.[1].conclusion')
          echo "previous_conclusion=$previous_conclusion" >> $GITHUB_OUTPUT

      - name: Send Zulip notification
        if: steps.previous_run.outputs.previous_conclusion == 'failure'
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: ci-status-bot@youtrackdb.zulipchat.com
          organization-url: 'https://youtrackdb.zulipchat.com'
          to: 'ytdb'
          type: 'stream'
          topic: 'ci status'
          content: |
            **BUILD FIXED** :white_check_mark:
            Build fixed on branch `${{ github.ref_name }}` for commit ${{ github.sha }} for repo ${{ github.repository }}.
            [View Run Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
